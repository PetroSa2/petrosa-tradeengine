---
# yamllint disable
name: CI Checks

on:
  push:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    branches: [ main, develop ]
  pull_request:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
  release:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    types: [ published ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/petrosa-tradeengine
  NAMESPACE: petrosa-apps

# =============================================================================
# PR CHECKS ONLY - No deployment
# =============================================================================

jobs:
  lint:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Lint & Format Check
    runs-on: petrosa-org-runners
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run linting
      run: make lint

    - name: Run type check
      run: make type-check
      continue-on-error: true

  test:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Test & Coverage
    runs-on: petrosa-org-runners
    env:
      MONGODB_URL: "mongodb://testuser:testpass@localhost:27017/testdb"
      MONGODB_URI: "mongodb://testuser:testpass@localhost:27017/testdb"
      MONGODB_DATABASE: "testdb"
      NATS_SERVERS: "nats://localhost:4222"
      NATS_ENABLED: "false"
      MYSQL_URI: "mysql://testuser:testpass@localhost:3306/testdb"
      JWT_SECRET_KEY: "test-jwt-secret-key-for-testing-only"
      BINANCE_API_KEY: "test-api-key"
      BINANCE_API_SECRET: "test-api-secret"
      BINANCE_TESTNET: "true"
      ENVIRONMENT: "test"
      LOG_LEVEL: "DEBUG"
      SIMULATION_ENABLED: "true"
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run tests with coverage
      run: make test
      continue-on-error: true

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: PetroSa2/petrosa-tradeengine
        files: ./coverage.xml
        flags: unittests
        fail_ci_if_error: false

  test-quality:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Test Quality Check
    runs-on: petrosa-org-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install make
        run: sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends make
      - name: Run test quality check
        run: make test-quality

  security:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Security Scan
    runs-on: petrosa-org-runners
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🔐 Run Gitleaks (Secret Detection)
      run: |
        GITLEAKS_VERSION="8.18.4"
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz -C /tmp gitleaks
        /tmp/gitleaks detect --source . --no-git || echo "⚠️ Gitleaks found issues but continuing"
      continue-on-error: true

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🐍 Run Bandit (Python Security)
      continue-on-error: true
      run: |
        pip install bandit[toml]
        bandit -r . -f json -o bandit-report.json || true
        echo "📊 Bandit Results:"
        python -m json.tool bandit-report.json 2>/dev/null | head -30 || echo "No issues found"

    - name: 🗂️ Run Trivy (Vulnerability Scanner)
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'
        ignore-unfixed: true
        vuln-type: 'os,library'

  # Pipeline status check - aggregates all PR checks
  pipeline:
    name: pipeline
    runs-on: petrosa-org-runners
    needs: [lint, test, test-quality, security]
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - name: Validate pipeline results
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "test=${{ needs.test.result }}"
          echo "test-quality=${{ needs.test-quality.result }}"
          echo "security=${{ needs.security.result }}"

          [[ "${{ needs.lint.result }}" == "success" ]]
          [[ "${{ needs.test.result }}" != "failure" ]]
          [[ "${{ needs.test-quality.result }}" == "success" ]]
          [[ "${{ needs.security.result }}" != "failure" ]]

# =============================================================================
# MAIN BRANCH DEPLOYMENT ONLY - No checks (they passed in PR)
# =============================================================================

  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set version
      id: version
      run: |
        RAW_VERSION=$(sed -n 's/^version = "\([^"]*\)"/\1/p' pyproject.toml)
        BASE_VERSION="v${RAW_VERSION}"
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        VERSION="${BASE_VERSION}-r${{ github.run_number }}-${SHORT_SHA}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"

    - name: Create tag
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git tag -a "$VERSION" -m "Release $VERSION"
        git push origin "$VERSION"

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [prepare-release]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-url: ${{ steps.build.outputs.image-url }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="${{ needs.prepare-release.outputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Final version for build: $VERSION"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ steps.version.outputs.version }}
          type=raw,value=latest

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
          COMMIT_SHA=${{ github.sha }}
          BUILD_DATE=${{ steps.meta.outputs.date }}

  gitops-update:
    name: GitOps Update
    runs-on: ubuntu-latest
    needs: [build-and-push, prepare-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Generate GitOps Bot Token
        uses: tibdex/github-app-token@v2
        id: generate_token
        with:
          app_id: ${{ secrets.GITOPS_APP_ID }}
          private_key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          installation_retrieval_mode: id
          installation_retrieval_payload: ${{ secrets.GITOPS_APP_INSTALLATION_ID }}

      - name: Checkout petrosa_k8s
        uses: actions/checkout@v4
        with:
          repository: PetroSa2/petrosa_k8s
          ref: main
          token: ${{ steps.generate_token.outputs.token }}
          path: petrosa_k8s

      - name: Rebase on main
        run: ./scripts/gitops-rebase-main.sh
        working-directory: petrosa_k8s

      - name: Update tradeengine image tag in GitOps manifests
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          find petrosa_k8s/k8s/tradeengine -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 | xargs -0 -r sed -E -i "s|(image:[[:space:]]*)([^[:space:]]*/)?(petrosa-tradeengine):[^[:space:]]*|\1\2\3:$VERSION|g"
          find petrosa_k8s/k8s/tradeengine -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 | xargs -0 -r sed -E -i "s/^([[:space:]]*(version|app\.kubernetes\.io\/version)):.*/\1: $VERSION/g"
          find petrosa_k8s/k8s/tradeengine -type f \( -name "*.yaml" -o -name "*.yml" \) -print0 | xargs -0 -r sed -i "s/VERSION_PLACEHOLDER/$VERSION/g"
          echo "Updated tradeengine image tag to $VERSION in petrosa_k8s/k8s/tradeengine/"

      - name: Commit and push to petrosa_k8s
        working-directory: petrosa_k8s
        run: |
          git config user.name "gitops-bot"
          git config user.email "gitops-bot@users.noreply.github.com"
          git add k8s/tradeengine/
          if git diff --staged --quiet; then
            echo "No changes to commit (version might already be up to date)"
          else
            git commit -m "gitops: tradeengine image ${{ needs.prepare-release.outputs.version }}"
            git push origin main
          fi

  notify:
    needs: [build-and-push, prepare-release, gitops-update]
    runs-on: ubuntu-latest
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
    - name: Notify build status
      run: |
        VERSION="${{ needs.prepare-release.outputs.version }}"
        if [ "${{ needs.gitops-update.result }}" == "success" ]; then
          echo "✅ Build, Push, and GitOps Update successful!"
          echo "📦 Version: ${VERSION}"
          echo "🚀 Deployed via petrosa_k8s hub"
        else
          echo "❌ GitOps Update failed (or skipped)!"
          echo "📦 Version: ${VERSION}"
          echo "🐳 Image pushed, but manifest update failed."
        fi

  cleanup:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    steps:
    - name: Clean up old images
      run: |
        echo "Cleaning up old Docker images..."
