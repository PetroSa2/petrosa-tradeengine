name: CI Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
  release:
    types: [ published ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/petrosa-tradeengine
  NAMESPACE: petrosa-apps

# =============================================================================
# PR CHECKS ONLY - No deployment
# =============================================================================

jobs:
  # PR Checks - Only run on pull requests
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    # Test environment variables - ONLY for testing, never for production
    env:
      # MongoDB test configuration
      MONGODB_URL: "mongodb://testuser:testpass@localhost:27017/testdb"
      MONGODB_URI: "mongodb://testuser:testpass@localhost:27017/testdb"
      MONGODB_DATABASE: "testdb"

      # NATS test configuration
      NATS_SERVERS: "nats://localhost:4222"
      NATS_ENABLED: "false"

      # MySQL test configuration (if needed)
      MYSQL_URI: "mysql://testuser:testpass@localhost:3306/testdb"

      # JWT test configuration
      JWT_SECRET_KEY: "test-jwt-secret-key-for-testing-only"

      # Binance test configuration
      BINANCE_API_KEY: "test-api-key"
      BINANCE_API_SECRET: "test-api-secret"
      BINANCE_TESTNET: "true"

      # Application test configuration
      ENVIRONMENT: "test"
      LOG_LEVEL: "DEBUG"
      SIMULATION_ENABLED: "true"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Cache virtual environment
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-venv-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m venv .venv || echo "Virtual environment already exists"
        source .venv/bin/activate
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Install pre-commit
      run: |
        source .venv/bin/activate
        pip install pre-commit
        pre-commit install

    - name: Run pre-commit on PR diff
      run: |
        source .venv/bin/activate
        BASE_REF="${{ github.base_ref }}"
        if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
        pre-commit run --from-ref origin/$BASE_REF --to-ref HEAD

    - name: Run flake8 linting
      run: |
        source .venv/bin/activate
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --statistics

    - name: Run black formatting check
      run: |
        source .venv/bin/activate
        BASE_REF="${{ github.base_ref }}"
        if [ -z "$BASE_REF" ]; then BASE_REF="main"; fi
        CHANGED_PY_FILES=$(git diff --name-only --diff-filter=ACMRT origin/$BASE_REF...HEAD -- '*.py' || true)
        if [ -z "$CHANGED_PY_FILES" ]; then
          echo "No Python files changed in PR diff; skipping black check."
          exit 0
        fi
        echo "Running black on changed Python files:"
        echo "$CHANGED_PY_FILES" | sed 's/^/  - /'
        black --check --diff $CHANGED_PY_FILES

    - name: Run ruff linting
      run: |
        source .venv/bin/activate
        ruff check .

    - name: Run mypy type checking
      continue-on-error: true  # Temporary: allow mypy errors while improving type annotations
      run: |
        source .venv/bin/activate
        make type-check

    - name: Run pytest with coverage
      continue-on-error: true  # Temporary: allow test failures in pre-existing OCO tests
      run: |
        source .venv/bin/activate
        pytest --cov=tradeengine --cov=contracts --cov=shared --cov=otel_init --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: PetroSa2/petrosa-tradeengine
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # PR Test Quality Check - Only run on pull requests
  test-quality:
    name: Test Quality Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout service code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Use check-test-assertions script
        run: |
          # Script is already in the repository at scripts/check-test-assertions.py
          chmod +x scripts/check-test-assertions.py

      - name: Check test assertions
        run: |
          # Find all test files and check them
          TEST_FILES=$(find . -type f -name "test_*.py" -o -name "*_test.py" | grep -v petrosa_k8s | grep -v ".venv" | grep -v "__pycache__" || true)
          if [ -z "$TEST_FILES" ]; then
            echo "⚠️  No test files found - skipping test quality check"
            exit 0
          fi
          echo "Found test files:"
          echo "$TEST_FILES" | sed 's/^/  - /'
          python scripts/check-test-assertions.py $(echo "$TEST_FILES" | tr '\n' ' ')
          if [ $? -ne 0 ]; then
            echo "❌ Tests without assertions detected"
            exit 1
          fi
          echo "✅ All tests have assertions"

  # PR Security Scan - Only run on pull requests
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # Required for SARIF upload
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for secret detection

    - name: 🔐 Run Gitleaks (Secret Detection)
      uses: gitleaks/gitleaks-action@v2
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🐍 Run Bandit (Python Security)
      continue-on-error: true
      run: |
        pip install bandit[toml]
        bandit -r . \
          --configfile .bandit \
          --severity-level medium \
          --confidence-level medium \
          --format json \
          --output bandit-report.json
        echo "📊 Bandit Results:"
        python -m json.tool bandit-report.json | head -30 || echo "No issues found"

    - name: 🗂️ Run Trivy (Vulnerability Scanner)
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        # Use exit-code '1' to fail the pipeline if vulnerabilities are found
        # This enforces security standards and blocks PRs with high-severity issues
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      # Upload SARIF if the scan completed (success or failure), but not if cancelled/skipped
      if: success() || failure()
      with:
        sarif_file: 'trivy-results.sarif'


  # Pipeline status check - aggregates all PR checks
  pipeline:
    name: pipeline
    runs-on: ubuntu-latest
    needs: [lint-and-test, test-quality, security-scan]
    if: always()
    steps:
      - name: Validate upstream job results
        run: |
          echo "lint-and-test=${{ needs.lint-and-test.result }}"
          echo "test-quality=${{ needs.test-quality.result }}"
          echo "security-scan=${{ needs.security-scan.result }}"

          [[ "${{ needs.lint-and-test.result }}" == "success" ]]
          [[ "${{ needs.test-quality.result }}" == "success" ]]
          [[ "${{ needs.security-scan.result }}" == "success" ]]

# =============================================================================
# MAIN BRANCH DEPLOYMENT ONLY - No checks (they passed in PR)
# =============================================================================

  # Main Branch Deployment - Only run on main branch pushes
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.VERSION }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set version
      id: version
      run: |
        BASE_VERSION="v1.2.13"
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        VERSION="${BASE_VERSION}-r${{ github.run_number }}-${SHORT_SHA}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Release version: $VERSION"

    - name: Create tag
      run: |
        VERSION="${{ steps.version.outputs.VERSION }}"
        git config --global user.email "action@github.com"
        git config --global user.name "GitHub Action"
        git tag -a "$VERSION" -m "Release $VERSION"
        git push origin "$VERSION"

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [prepare-release]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-url: ${{ steps.build.outputs.image-url }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Determine version
      id: version
      run: |
        if [[ "${{ github.ref }}" == refs/tags/* ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="${{ needs.prepare-release.outputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Final version for build: $VERSION"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=raw,value=${{ steps.version.outputs.version }}
          type=raw,value=latest

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
          COMMIT_SHA=${{ github.sha }}
          BUILD_DATE=${{ steps.meta.outputs.date }}

  notify:
    needs: [build-and-push, create-release]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Notify build status
      run: |
        VERSION="${{ needs.create-release.outputs.version }}"
        TAG_CREATED="${{ needs.create-release.outputs.tag-created }}"
        IMAGE_TAG="${{ needs.build-and-push.outputs.version }}"

        echo "✅ Build and Push successful!"
        echo "📦 Version: ${VERSION}"
        echo "🐳 Image Tag: ${IMAGE_TAG}"
        if [ "$TAG_CREATED" == "true" ]; then
          echo "🏷️  New tag created: ${VERSION}"
        else
          echo "🏷️  Using existing tag: ${VERSION}"
        fi
        echo "🚀 Ready for deployment via petrosa_k8s hub"

  cleanup:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Clean up old images
      run: |
        echo "Cleaning up old Docker images..."
        # Add cleanup logic here
        # Example: Delete images older than 30 days from Docker Hub
