# Canonical hardened Serena MCP project config for Petrosa services.
#
# Generated by petrosa_k8s/scripts/sync-tooling.py — edit the template here,
# not the per-repo `.serena/project.yml`. Each per-repo run substitutes
# `.venv` and writes this file to `<repo>/.serena/project.yml`.
#
# Hardening goals (see docs/serena-adoption.md +
# tech-spec-adopt-serena-mcp-hardened.md):
#   - read_only: disable write-class tools at adoption
#   - ide-assistant context: defense-in-depth disable of shell exec
#   - explicit allowlist: no execute_shell_command, no replace_content,
#     no replace_symbol_body, no rename, no initial_instructions
#   - ignored_paths: keep agents out of generated/private directories

language: python
read_only: true
context: ide-assistant

# Safe symbolic tools only. Any tool not listed here is disabled by Serena.
# Do NOT add execute_shell_command, replace_content, replace_symbol_body,
# rename, or initial_instructions — those carry the lethal-trifecta risk
# described in the adoption runbook.
included_optional_tools:
  - find_symbol
  - find_referencing_symbols
  - get_symbols_overview
  - list_dir
  - read_file
  - search_for_pattern

# Detected venv dir for this repo is .venv (substituted at sync time).
ignored_paths:
  - .venv
  - venv
  - .git
  - node_modules
  - dist
  - build
  - .pytest_cache
  - k8s
  - _bmad
  - _bmad-output
  - .serena/cache
