---
name: CI Checks

on:
  workflow_dispatch: true
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  release:
    types: [published]

jobs:
  pipeline:
    name: CI Pipeline
    uses: PetroSa2/petrosa-shared-workflows/.github/workflows/ci-pipeline.yml@main  # yamllint disable-line rule:line-length
    with:
      service-name: 'tradeengine'
      image-name: 'yurisa2/petrosa-tradeengine'
      python-version: '3.11'
      skip-docker-build: true
      coverage-threshold: '20'
      pytest-extra-args: >-  # yamllint disable-line rule:line-length
        --ignore=tests/test_api.py
        --ignore=tests/test_api_config_routes_comprehensive.py
        --ignore=tests/test_api_config_validation.py
        --ignore=tests/test_api_filter_routes.py
        --ignore=tests/test_cio_state.py
        --ignore=tests/test_trading_config_rollback.py
        --ignore=tests/test_span_attributes.py
    secrets: inherit
