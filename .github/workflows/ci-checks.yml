name: CI Checks

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Cache virtual environment
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-venv-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m venv .venv || echo "Virtual environment already exists"
        source .venv/bin/activate
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Run flake8 linting
      run: |
        source .venv/bin/activate
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --statistics

    - name: Run black formatting check
      run: |
        source .venv/bin/activate
        CHANGED_PY_FILES=$(git diff --name-only --diff-filter=ACMRT origin/${{ github.base_ref }}...HEAD -- '*.py' || true)
        if [ -z "$CHANGED_PY_FILES" ]; then
          echo "No Python files changed in PR diff; skipping black check."
          exit 0
        fi
        echo "Running black on changed Python files:"
        echo "$CHANGED_PY_FILES" | sed 's/^/  - /'
        black --check --diff $CHANGED_PY_FILES

    - name: Run ruff linting
      run: |
        source .venv/bin/activate
        ruff check .

    - name: Run mypy type checking
      continue-on-error: true
      run: |
        source .venv/bin/activate
        mypy tradeengine/ contracts/ shared/ --ignore-missing-imports --strict

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v1
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Run Bandit security scan
      run: |
        pip install bandit
        bandit -r . -f json -o bandit-report.json -ll --exclude tests/,.venv,venv,htmlcov,.git,__pycache__,*.egg-info

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: 'CRITICAL,HIGH'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: success() || failure()
      with:
        sarif_file: 'trivy-results.sarif'

  test-quality:
    name: Test Quality Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Checkout service code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Use check-test-assertions script
      run: |
        chmod +x scripts/check-test-assertions.py

    - name: Check test assertions
      run: |
        TEST_FILES=$(find . -type f -name "test_*.py" -o -name "*_test.py" | grep -v petrosa_k8s | grep -v ".venv" | grep -v "__pycache__" || true)
        if [ -z "$TEST_FILES" ]; then
          echo "No test files found - skipping test quality check"
          exit 0
        fi
        echo "Found test files:"
        echo "$TEST_FILES" | sed 's/^/  - /'
        python scripts/check-test-assertions.py $(echo "$TEST_FILES" | tr '\n' ' ')
        if [ $? -ne 0 ]; then
          echo "Tests without assertions detected"
          exit 1
        fi
        echo "All tests have assertions"

  pipeline:
    name: pipeline
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan, test-quality]
    if: always() && github.event_name == 'pull_request'
    steps:
      - name: Validate upstream job results
        run: |
          echo "lint-and-typecheck=${{ needs.lint-and-typecheck.result }}"
          echo "security-scan=${{ needs.security-scan.result }}"
          echo "test-quality=${{ needs.test-quality.result }}"

          [[ "${{ needs.lint-and-typecheck.result }}" != "failure" ]]
          [[ "${{ needs.security-scan.result }}" != "failure" ]]
          [[ "${{ needs.test-quality.result }}" == "success" ]]
